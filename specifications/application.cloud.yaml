application:
  id: incubadora-hibrida-cloud
  name: Incubadora híbrida cuántico-clásica
  version: "1.0"

services:
  - id: quantum-detector
    type: hybrid-service
    source:
      repository: https://github.com/DavidWindmill/quantum-anomaly-detector-service.git
      revision: main
      dockerfile: Dockerfile
    deployment:
      service_name: incubator-quantum-detector
      image_name: quantum-anomaly-detector
      public: true
      cpu: "1"
      memory: 1Gi
      min_instances: 0
      max_instances: 1
      concurrency: 10

  - id: aggregator
    type: classical-service
    source:
      repository: https://github.com/DavidWindmill/incubator-aggregator-service.git
      revision: main
      dockerfile: Dockerfile
    deployment:
      service_name: incubator-aggregator
      image_name: incubator-aggregator
      public: true
      cpu: "1"
      memory: 512Mi
      min_instances: 0
      max_instances: 1
      concurrency: 1
    environment:
      DETECTOR_URL:
        from_service: quantum-detector
      SAFE_MIN_C: "37.0"
      SAFE_MAX_C: "38.0"
      BATCH_SIZE: "8"
      SHOTS: "2048"
      REQUEST_TIMEOUT_SECONDS: "240"

  - id: sensor-left
    type: classical-service
    source:
      repository: https://github.com/DavidWindmill/incubator-sensor-service.git
      revision: main
      dockerfile: Dockerfile
    deployment:
      service_name: incubator-sensor-left
      image_name: incubator-sensor
      public: true
      memory: 512Mi
      min_instances: 0
      max_instances: 1
    environment:
      SENSOR_ID: temperature-sensor-1
      SENSOR_ZONE: izquierda
      AGGREGATOR_URL:
        from_service: aggregator
      REQUEST_TIMEOUT_SECONDS: "240"

  - id: sensor-center
    type: classical-service
    source:
      repository: https://github.com/DavidWindmill/incubator-sensor-service.git
      revision: main
      dockerfile: Dockerfile
    deployment:
      service_name: incubator-sensor-center
      image_name: incubator-sensor
      public: true
      memory: 512Mi
      min_instances: 0
      max_instances: 1
    environment:
      SENSOR_ID: temperature-sensor-2
      SENSOR_ZONE: centro
      AGGREGATOR_URL:
        from_service: aggregator
      REQUEST_TIMEOUT_SECONDS: "240"

  - id: sensor-right
    type: classical-service
    source:
      repository: https://github.com/DavidWindmill/incubator-sensor-service.git
      revision: main
      dockerfile: Dockerfile
    deployment:
      service_name: incubator-sensor-right
      image_name: incubator-sensor
      public: true
      memory: 512Mi
      min_instances: 0
      max_instances: 1
    environment:
      SENSOR_ID: temperature-sensor-3
      SENSOR_ZONE: derecha
      AGGREGATOR_URL:
        from_service: aggregator
      REQUEST_TIMEOUT_SECONDS: "240"

outputs:
  DETECTOR_URL: quantum-detector
  AGGREGATOR_URL: aggregator
  SENSOR_LEFT_URL: sensor-left
  SENSOR_CENTER_URL: sensor-center
  SENSOR_RIGHT_URL: sensor-right
